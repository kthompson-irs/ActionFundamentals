name: My first workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the deployment environment'
        type: environment
        required: true

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: echo "Building..."

  Test:
    runs-on: ubuntu-latest
    needs: Build
    if: github.event_name == 'workflow_dispatch'
    environment: Test
    steps:
      - name: Run tests
        run: echo "Testing..."

  Load-Test:
    runs-on: ubuntu-latest
    needs: Build
    if: github.event_name == 'workflow_dispatch'
    environment: Load-Test
    steps:
      - name: Run load test
        run: |
          echo "Testing..."
          sleep 15

  Production:
    runs-on: ubuntu-latest
    needs:
      - Test
      - Load-Test
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'Production'
    environment:
      name: Production
      url: https://writeabout.net
    steps:
      - name: Deploy step 1
        run: |
          echo "Step 1 deploying..."
          sleep 10

      - name: Deploy step 2
        run: |
          echo "Step 2 deploying..."
          sleep 10

      - name: Deploy step 3
        run: |
          echo "Step 3 deploying..."
          sleep 10

      - name: Deploy step 4
        run: |
          echo "Step 4 deploying..."
          sleep 10

      - name: Deploy step 5
        run: |
          echo "Step 5 deploying..."
          sleep 10
